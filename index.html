<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리 동네 아파트 실거래가 대시보드</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js for data visualization -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- PapaParse for CSV parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: #f0fdf4; /* Light emerald tint background */
        }
        .stats-card {
            transition: transform 0.2s ease;
        }
        .stats-card:hover {
            transform: translateY(-2px);
        }
        select {
            appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%23059669' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 0.5rem center;
            background-size: 1.5em 1.5em;
        }
        /* Ranking Medals */
        .rank-1 { background-color: #fef3c7; color: #92400e; border: 1px solid #fde68a; }
        .rank-2 { background-color: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }
        .rank-3 { background-color: #ffedd5; color: #9a3412; border: 1px solid #fed7aa; }
    </style>
</head>
<body class="text-gray-900 antialiased min-h-screen">

    <div class="max-w-7xl mx-auto px-4 py-8">
        <!-- Header -->
        <header class="mb-10 flex flex-col md:flex-row md:items-end justify-between gap-4 border-b border-emerald-100 pb-6">
            <div>
                <h1 class="text-3xl font-bold text-emerald-900">우리 동네 아파트 실거래가 대시보드</h1>
                <p class="mt-2 text-emerald-600/80">실시간 연동 데이터 기반 아파트 거래 분석</p>
            </div>
            <div class="flex flex-col items-end gap-2">
                <div id="last-updated" class="text-xs text-emerald-400 font-medium tracking-tight">데이터 로딩 중...</div>
                <!-- Filter Section -->
                <div class="flex items-center gap-3 bg-white p-2 rounded-xl shadow-sm border border-emerald-100">
                    <label for="dong-filter" class="text-sm font-bold text-emerald-700 ml-2">📍 지역 선택</label>
                    <select id="dong-filter" class="bg-emerald-50 border-none text-emerald-900 text-sm rounded-lg focus:ring-emerald-500 focus:border-emerald-500 block w-40 p-2 pr-8 cursor-pointer font-semibold">
                        <option value="all">전체 지역</option>
                    </select>
                </div>
            </div>
        </header>

        <!-- Summary Statistics -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-10">
            <!-- Total Count Card -->
            <div class="stats-card bg-white p-6 rounded-2xl shadow-sm border border-emerald-50">
                <div class="flex items-center gap-2 mb-2">
                    <span class="text-xl">🏠</span>
                    <p class="text-sm text-gray-500 font-semibold uppercase tracking-tight">전체 거래 건수</p>
                </div>
                <div class="flex items-baseline gap-1">
                    <span id="stat-total-count" class="text-3xl font-bold text-emerald-600">-</span>
                    <span class="text-gray-400 text-sm font-medium">건</span>
                </div>
            </div>
            <!-- Average Price Card -->
            <div class="stats-card bg-white p-6 rounded-2xl shadow-sm border border-emerald-50">
                <div class="flex items-center gap-2 mb-2">
                    <span class="text-xl">💰</span>
                    <p class="text-sm text-gray-500 font-semibold uppercase tracking-tight">평균 거래가격</p>
                </div>
                <div class="flex items-baseline gap-1">
                    <span id="stat-avg-price" class="text-3xl font-bold text-teal-600">-</span>
                    <span class="text-gray-400 text-sm font-medium">만원</span>
                </div>
            </div>
            <!-- Max Price Card -->
            <div class="stats-card bg-white p-6 rounded-2xl shadow-sm border border-emerald-50">
                <div class="flex items-center gap-2 mb-2">
                    <span class="text-xl">📈</span>
                    <p class="text-sm text-gray-500 font-semibold uppercase tracking-tight">최고 거래가격</p>
                </div>
                <div class="flex items-baseline gap-1">
                    <span id="stat-max-price" class="text-3xl font-bold text-green-700">-</span>
                    <span class="text-gray-400 text-sm font-medium">만원</span>
                </div>
            </div>
            <!-- Min Price Card -->
            <div class="stats-card bg-white p-6 rounded-2xl shadow-sm border border-emerald-50">
                <div class="flex items-center gap-2 mb-2">
                    <span class="text-xl">📉</span>
                    <p class="text-sm text-gray-500 font-semibold uppercase tracking-tight">최저 거래가격</p>
                </div>
                <div class="flex items-baseline gap-1">
                    <span id="stat-min-price" class="text-3xl font-bold text-lime-600">-</span>
                    <span class="text-gray-400 text-sm font-medium">만원</span>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-10">
            <!-- Chart Section -->
            <div class="lg:col-span-2 bg-white p-6 rounded-2xl shadow-sm border border-emerald-50">
                <h2 class="text-xl font-bold text-gray-800 mb-6">월별 평균 거래가격 추이</h2>
                <div class="h-80 md:h-96">
                    <canvas id="priceChart"></canvas>
                </div>
            </div>

            <!-- Ranking Section -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-emerald-50">
                <div class="flex items-center gap-2 mb-6">
                    <span class="text-xl">🏆</span>
                    <h2 class="text-xl font-bold text-gray-800">비싼 아파트 TOP 5</h2>
                </div>
                <div id="ranking-list" class="space-y-4">
                    <!-- Ranking items will be injected here -->
                    <p class="text-gray-400 text-center py-10">데이터 로딩 중...</p>
                </div>
            </div>
        </div>

        <!-- Table Section -->
        <div class="bg-white rounded-2xl shadow-sm border border-emerald-50 overflow-hidden">
            <div class="p-6 border-b border-emerald-50 flex justify-between items-center">
                <h2 class="text-xl font-bold text-gray-800">거래 상세 목록</h2>
                <div class="text-sm text-emerald-600">조회 결과 <span id="table-count" class="font-bold">0</span>건</div>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-emerald-50/50 text-emerald-700 text-xs uppercase tracking-wider">
                        <tr>
                            <th class="px-6 py-4 font-semibold">거래일자</th>
                            <th class="px-6 py-4 font-semibold">아파트명</th>
                            <th class="px-6 py-4 font-semibold">법정동</th>
                            <th class="px-6 py-4 font-semibold">면적(㎡)</th>
                            <th class="px-6 py-4 font-semibold">층</th>
                            <th class="px-6 py-4 font-semibold text-right">거래금액(만원)</th>
                        </tr>
                    </thead>
                    <tbody id="transaction-table" class="text-sm">
                        <!-- Data rows will be injected here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTS0UTIvu5cAREvu0bcAryhtDBwzFmmclPaQ40LBcXSsnUluNEeLAQNv_gz2iSGVkY0pugfdatCFixU/pub?gid=1461296913&single=true&output=csv';

        let chartInstance = null;
        let allTransactions = []; // Store raw data for filtering

        /**
         * Parses and cleans price strings
         */
        function cleanPrice(price) {
            if (typeof price === 'number') return price;
            if (!price) return 0;
            return parseInt(String(price).replace(/,/g, ''));
        }

        /**
         * Formats date for display
         */
        function formatDate(dateStr) {
            const s = String(dateStr);
            if (s.length === 8) {
                return `${s.substring(0, 4)}-${s.substring(4, 6)}-${s.substring(6, 8)}`;
            }
            return s;
        }

        /**
         * Fetch and process the data
         */
        async function loadDashboard() {
            try {
                Papa.parse(CSV_URL, {
                    download: true,
                    header: true,
                    dynamicTyping: true,
                    complete: function(results) {
                        allTransactions = results.data.filter(row => row['거래금액(만원)']);
                        initFilterOptions(allTransactions);
                        updateDashboard(allTransactions);
                    },
                    error: function(err) {
                        console.error('Error fetching CSV:', err);
                        document.getElementById('last-updated').innerText = '데이터 로딩 실패';
                    }
                });
            } catch (error) {
                console.error('Error starting parsing:', error);
            }
        }

        /**
         * Dynamically populates the dong filter dropdown
         */
        function initFilterOptions(data) {
            const dongSet = new Set();
            data.forEach(row => {
                if (row['법정동']) dongSet.add(row['법정동'].trim());
            });

            const sortedDongs = Array.from(dongSet).sort();
            const filterEl = document.getElementById('dong-filter');
            
            sortedDongs.forEach(dong => {
                const option = document.createElement('option');
                option.value = dong;
                option.textContent = dong;
                filterEl.appendChild(option);
            });

            // Add filter event listener
            filterEl.addEventListener('change', (e) => {
                const selectedDong = e.target.value;
                if (selectedDong === 'all') {
                    updateDashboard(allTransactions);
                } else {
                    const filtered = allTransactions.filter(row => row['법정동'].trim() === selectedDong);
                    updateDashboard(filtered);
                }
            });
        }

        /**
         * Updates all UI components based on provided (possibly filtered) data
         */
        function updateDashboard(data) {
            if (data.length === 0) {
                document.getElementById('ranking-list').innerHTML = '<p class="text-gray-400 text-center py-10">데이터가 없습니다.</p>';
                return;
            }

            const prices = data.map(row => cleanPrice(row['거래금액(만원)']));
            
            // 1. Update Summary Stats
            const count = prices.length;
            const max = Math.max(...prices);
            const min = Math.min(...prices);
            const avg = Math.round(prices.reduce((a, b) => a + b, 0) / count);

            document.getElementById('stat-total-count').innerText = count.toLocaleString();
            document.getElementById('stat-avg-price').innerText = avg.toLocaleString();
            document.getElementById('stat-max-price').innerText = max.toLocaleString();
            document.getElementById('stat-min-price').innerText = min.toLocaleString();
            document.getElementById('table-count').innerText = count.toLocaleString();
            document.getElementById('last-updated').innerText = '마지막 업데이트: ' + new Date().toLocaleTimeString();

            // 2. Ranking TOP 5
            updateRanking(data);

            // 3. Prepare Chart Data (Monthly Average)
            const monthlyData = {};
            data.forEach(row => {
                const dateStr = String(row['거래일자']);
                const monthKey = dateStr.substring(0, 4) + '-' + dateStr.substring(4, 6);
                const price = cleanPrice(row['거래금액(만원)']);

                if (!monthlyData[monthKey]) {
                    monthlyData[monthKey] = { sum: 0, count: 0 };
                }
                monthlyData[monthKey].sum += price;
                monthlyData[monthKey].count += 1;
            });

            const sortedMonths = Object.keys(monthlyData).sort();
            const monthlyAvgs = sortedMonths.map(m => Math.round(monthlyData[m].sum / monthlyData[m].count));

            renderChart(sortedMonths, monthlyAvgs);

            // 4. Update Table
            const tableBody = document.getElementById('transaction-table');
            tableBody.innerHTML = '';
            
            const sortedData = [...data].sort((a, b) => String(b['거래일자']).localeCompare(String(a['거래일자'])));

            sortedData.forEach((row, index) => {
                const tr = document.createElement('tr');
                const priceValue = cleanPrice(row['거래금액(만원)']);
                
                tr.className = `transition-colors hover:bg-emerald-100/50 ${index % 2 === 0 ? 'bg-white' : 'bg-emerald-50/20'}`;
                const priceColorClass = priceValue >= 50000 ? 'text-red-600' : 'text-emerald-700';

                tr.innerHTML = `
                    <td class="px-6 py-4 text-emerald-800/70 font-medium">${formatDate(row['거래일자'])}</td>
                    <td class="px-6 py-4 font-bold text-gray-800">${row['아파트명']}</td>
                    <td class="px-6 py-4 text-gray-500">${row['법정동']}</td>
                    <td class="px-6 py-4 text-gray-500">${row['전용면적(㎡)']}</td>
                    <td class="px-6 py-4 text-gray-500">${row['층']}층</td>
                    <td class="px-6 py-4 text-right font-bold ${priceColorClass}">${priceValue.toLocaleString()}</td>
                `;
                tableBody.appendChild(tr);
            });
        }

        /**
         * Updates the TOP 5 Ranking List
         */
        function updateRanking(data) {
            const rankingList = document.getElementById('ranking-list');
            rankingList.innerHTML = '';

            // Sort by price descending and take top 5
            const top5 = [...data]
                .sort((a, b) => cleanPrice(b['거래금액(만원)']) - cleanPrice(a['거래금액(만원)']))
                .slice(0, 5);

            top5.forEach((row, index) => {
                const rank = index + 1;
                const priceValue = cleanPrice(row['거래금액(만원)']);
                let rankClass = 'bg-gray-50 text-gray-600 border-gray-100';
                
                if (rank === 1) rankClass = 'rank-1';
                else if (rank === 2) rankClass = 'rank-2';
                else if (rank === 3) rankClass = 'rank-3';

                const item = document.createElement('div');
                item.className = 'flex items-center gap-4 p-3 rounded-xl border transition-all hover:shadow-md';
                item.innerHTML = `
                    <div class="flex-shrink-0 w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm ${rankClass}">
                        ${rank}
                    </div>
                    <div class="flex-grow min-w-0">
                        <h3 class="font-bold text-gray-800 truncate text-sm">${row['아파트명']}</h3>
                        <p class="text-xs text-gray-500">${row['전용면적(㎡)']}㎡ / ${row['층']}층</p>
                    </div>
                    <div class="text-right">
                        <p class="font-bold text-emerald-700 text-sm">${priceValue.toLocaleString()} <span class="text-[10px] font-normal text-gray-400">만원</span></p>
                    </div>
                `;
                rankingList.appendChild(item);
            });
        }

        /**
         * Renders/Updates the Chart
         */
        function renderChart(labels, values) {
            const ctx = document.getElementById('priceChart').getContext('2d');
            
            if (chartInstance) {
                chartInstance.destroy();
            }

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '평균 거래금액(만원)',
                        data: values,
                        borderColor: '#10b981', 
                        backgroundColor: (context) => {
                            const chart = context.chart;
                            const {ctx, chartArea} = chart;
                            if (!chartArea) return null;
                            const gradient = ctx.createLinearGradient(0, chartArea.top, 0, chartArea.bottom);
                            gradient.addColorStop(0, 'rgba(16, 185, 129, 0.2)');
                            gradient.addColorStop(1, 'rgba(16, 185, 129, 0)');
                            return gradient;
                        },
                        borderWidth: 3,
                        tension: 0.4,
                        fill: true,
                        pointBackgroundColor: '#fff',
                        pointBorderColor: '#10b981',
                        pointBorderWidth: 2,
                        pointRadius: 4,
                        pointHoverRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            mode: 'index',
                            intersect: false,
                            backgroundColor: '#064e3b',
                            titleFont: { family: 'Pretendard', size: 13 },
                            bodyFont: { family: 'Pretendard', size: 13 },
                            padding: 12,
                            cornerRadius: 8,
                            callbacks: {
                                label: function(context) {
                                    return '평균가: ' + context.parsed.y.toLocaleString() + ' 만원';
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: { display: false },
                            ticks: { font: { family: 'Pretendard' }, color: '#64748b' }
                        },
                        y: {
                            beginAtZero: false,
                            grid: { color: '#ecfdf5' },
                            ticks: { 
                                font: { family: 'Pretendard' }, 
                                color: '#64748b',
                                callback: (value) => value.toLocaleString()
                            }
                        }
                    }
                }
            });
        }

        window.addEventListener('DOMContentLoaded', loadDashboard);
    </script>
</body>
</html>
