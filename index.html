<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리 동네 아파트 실거래가 대시보드</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js for data visualization -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- PapaParse for CSV parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: #f3f4f6;
        }
        .stats-card {
            transition: transform 0.2s ease;
        }
        .stats-card:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="text-gray-900 antialiased min-h-screen">

    <div class="max-w-7xl mx-auto px-4 py-8">
        <!-- Header -->
        <header class="mb-10 flex flex-col md:flex-row md:items-end justify-between gap-4 border-b border-gray-200 pb-6">
            <div>
                <h1 class="text-3xl font-bold text-blue-900">우리 동네 아파트 실거래가 대시보드</h1>
                <p class="mt-2 text-gray-500">실시간 연동 데이터 기반 아파트 거래 분석</p>
            </div>
            <div id="last-updated" class="text-sm text-gray-400 font-medium">데이터 로딩 중...</div>
        </header>

        <!-- Summary Statistics -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-10">
            <div class="stats-card bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <p class="text-sm text-gray-500 font-semibold mb-1">전체 거래 건수</p>
                <div class="flex items-baseline gap-1">
                    <span id="stat-total-count" class="text-3xl font-bold text-blue-600">-</span>
                    <span class="text-gray-400">건</span>
                </div>
            </div>
            <div class="stats-card bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <p class="text-sm text-gray-500 font-semibold mb-1">평균 거래가격</p>
                <div class="flex items-baseline gap-1">
                    <span id="stat-avg-price" class="text-3xl font-bold text-emerald-600">-</span>
                    <span class="text-gray-400">만원</span>
                </div>
            </div>
            <div class="stats-card bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <p class="text-sm text-gray-500 font-semibold mb-1">최고 거래가격</p>
                <div class="flex items-baseline gap-1">
                    <span id="stat-max-price" class="text-3xl font-bold text-rose-600">-</span>
                    <span class="text-gray-400">만원</span>
                </div>
            </div>
            <div class="stats-card bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <p class="text-sm text-gray-500 font-semibold mb-1">최저 거래가격</p>
                <div class="flex items-baseline gap-1">
                    <span id="stat-min-price" class="text-3xl font-bold text-amber-600">-</span>
                    <span class="text-gray-400">만원</span>
                </div>
            </div>
        </div>

        <!-- Chart Section -->
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 mb-10">
            <h2 class="text-xl font-bold text-gray-800 mb-6">월별 평균 거래가격 추이</h2>
            <div class="h-80 md:h-96">
                <canvas id="priceChart"></canvas>
            </div>
        </div>

        <!-- Table Section -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="p-6 border-b border-gray-100 flex justify-between items-center">
                <h2 class="text-xl font-bold text-gray-800">전체 거래 목록</h2>
                <div class="text-sm text-gray-500">전체 <span id="table-count" class="font-bold">0</span>건</div>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 text-gray-500 text-xs uppercase tracking-wider">
                        <tr>
                            <th class="px-6 py-4 font-semibold">거래일자</th>
                            <th class="px-6 py-4 font-semibold">아파트명</th>
                            <th class="px-6 py-4 font-semibold">법정동</th>
                            <th class="px-6 py-4 font-semibold">면적(㎡)</th>
                            <th class="px-6 py-4 font-semibold">층</th>
                            <th class="px-6 py-4 font-semibold text-right">거래금액(만원)</th>
                        </tr>
                    </thead>
                    <tbody id="transaction-table" class="divide-y divide-gray-100 text-sm">
                        <!-- Data rows will be injected here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTS0UTIvu5cAREvu0bcAryhtDBwzFmmclPaQ40LBcXSsnUluNEeLAQNv_gz2iSGVkY0pugfdatCFixU/pub?gid=1461296913&single=true&output=csv';

        let chartInstance = null;

        /**
         * Parses and cleans price strings (e.g., "120,000" -> 120000)
         */
        function cleanPrice(price) {
            if (typeof price === 'number') return price;
            if (!price) return 0;
            return parseInt(price.replace(/,/g, ''));
        }

        /**
         * Formats date for display
         */
        function formatDate(dateStr) {
            const s = String(dateStr);
            if (s.length === 8) {
                return `${s.substring(0, 4)}-${s.substring(4, 6)}-${s.substring(6, 8)}`;
            }
            return s;
        }

        /**
         * Fetch and process the data
         */
        async function loadDashboard() {
            try {
                Papa.parse(CSV_URL, {
                    download: true,
                    header: true,
                    dynamicTyping: true,
                    complete: function(results) {
                        const data = results.data.filter(row => row['거래금액(만원)']);
                        updateDashboard(data);
                    },
                    error: function(err) {
                        console.error('Error fetching CSV:', err);
                        document.getElementById('last-updated').innerText = '데이터 로딩 실패';
                    }
                });
            } catch (error) {
                console.error('Error starting parsing:', error);
            }
        }

        /**
         * Updates all UI components
         */
        function updateDashboard(data) {
            const prices = data.map(row => cleanPrice(row['거래금액(만원)']));
            
            // 1. Update Summary Stats
            const count = prices.length;
            const max = Math.max(...prices);
            const min = Math.min(...prices);
            const avg = Math.round(prices.reduce((a, b) => a + b, 0) / count);

            document.getElementById('stat-total-count').innerText = count.toLocaleString();
            document.getElementById('stat-avg-price').innerText = avg.toLocaleString();
            document.getElementById('stat-max-price').innerText = max.toLocaleString();
            document.getElementById('stat-min-price').innerText = min.toLocaleString();
            document.getElementById('table-count').innerText = count.toLocaleString();
            document.getElementById('last-updated').innerText = '마지막 업데이트: ' + new Date().toLocaleTimeString();

            // 2. Prepare Chart Data (Monthly Average)
            const monthlyData = {};
            data.forEach(row => {
                const dateStr = String(row['거래일자']);
                const monthKey = dateStr.substring(0, 4) + '-' + dateStr.substring(4, 6);
                const price = cleanPrice(row['거래금액(만원)']);

                if (!monthlyData[monthKey]) {
                    monthlyData[monthKey] = { sum: 0, count: 0 };
                }
                monthlyData[monthKey].sum += price;
                monthlyData[monthKey].count += 1;
            });

            const sortedMonths = Object.keys(monthlyData).sort();
            const monthlyAvgs = sortedMonths.map(m => Math.round(monthlyData[m].sum / monthlyData[m].count));

            renderChart(sortedMonths, monthlyAvgs);

            // 3. Update Table
            const tableBody = document.getElementById('transaction-table');
            tableBody.innerHTML = '';
            
            // Sort data by date descending for table
            const sortedData = [...data].sort((a, b) => String(b['거래일자']).localeCompare(String(a['거래일자'])));

            sortedData.forEach(row => {
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-blue-50/30 transition-colors';
                tr.innerHTML = `
                    <td class="px-6 py-4 text-gray-600 font-medium">${formatDate(row['거래일자'])}</td>
                    <td class="px-6 py-4 font-bold text-gray-800">${row['아파트명']}</td>
                    <td class="px-6 py-4 text-gray-500">${row['법정동']}</td>
                    <td class="px-6 py-4 text-gray-500">${row['전용면적(㎡)']}</td>
                    <td class="px-6 py-4 text-gray-500">${row['층']}층</td>
                    <td class="px-6 py-4 text-right font-bold text-blue-700">${cleanPrice(row['거래금액(만원)']).toLocaleString()}</td>
                `;
                tableBody.appendChild(tr);
            });
        }

        /**
         * Renders/Updates the Chart
         */
        function renderChart(labels, values) {
            const ctx = document.getElementById('priceChart').getContext('2d');
            
            if (chartInstance) {
                chartInstance.destroy();
            }

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '평균 거래금액(만원)',
                        data: values,
                        borderColor: '#2563eb',
                        backgroundColor: (context) => {
                            const chart = context.chart;
                            const {ctx, chartArea} = chart;
                            if (!chartArea) return null;
                            const gradient = ctx.createLinearGradient(0, chartArea.top, 0, chartArea.bottom);
                            gradient.addColorStop(0, 'rgba(37, 99, 235, 0.2)');
                            gradient.addColorStop(1, 'rgba(37, 99, 235, 0)');
                            return gradient;
                        },
                        borderWidth: 3,
                        tension: 0.4,
                        fill: true,
                        pointBackgroundColor: '#fff',
                        pointBorderColor: '#2563eb',
                        pointBorderWidth: 2,
                        pointRadius: 4,
                        pointHoverRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            mode: 'index',
                            intersect: false,
                            backgroundColor: '#1e293b',
                            titleFont: { family: 'Pretendard', size: 13 },
                            bodyFont: { family: 'Pretendard', size: 13 },
                            padding: 12,
                            cornerRadius: 8,
                            callbacks: {
                                label: function(context) {
                                    return '평균가: ' + context.parsed.y.toLocaleString() + ' 만원';
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: { display: false },
                            ticks: { font: { family: 'Pretendard' }, color: '#94a3b8' }
                        },
                        y: {
                            beginAtZero: false,
                            grid: { color: '#f1f5f9' },
                            ticks: { 
                                font: { family: 'Pretendard' }, 
                                color: '#94a3b8',
                                callback: (value) => value.toLocaleString()
                            }
                        }
                    }
                }
            });
        }

        // Initialize dashboard on load
        window.addEventListener('DOMContentLoaded', loadDashboard);
    </script>
</body>
</html>
